<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Magic Portal 16.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Выбор версии -->
    <div id="version-selector">
        <h1 class="glow-text">MAGIC PORTAL</h1>
        <div class="btn-group">
            <button class="alphabet-btn" onclick="initVersion('pc')">💻 ВЕРСИЯ ДЛЯ ПК</button>
            <button class="alphabet-btn" onclick="initVersion('mobile')">📱 МОБИЛЬНАЯ ВЕРСИЯ</button>
        </div>
    </div>

    <!-- Кнопка меню -->
    <button id="menu-trigger" onclick="toggleMenu()"></button>

    <!-- Динамическое меню -->
    <nav id="menu">
        <div class="item" onclick="location.reload()">🏠 ГЛАВНОЕ МЕНЮ</div>
        <div id="menu-items-container">
            <!-- Сюда JS вставит игры в зависимости от версии -->
        </div>
    </nav>

    <div id="welcome-screen" style="display:none;">
        <h1 class="glow-text">MAGIC PORTAL</h1>
        <p style="color:#00fbff">Выберите игру в меню слева</p>
    </div>

    <script src="https://cdnjs.cloudflare.com"></script>
    <script src="script.js"></script>
</body>
</html>
