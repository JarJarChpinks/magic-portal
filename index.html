<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Magic Portal - Fix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Контейнер для холста, чтобы он не перекрывал всё подряд -->
    <div id="canvas-wrapper"></div>

    <div id="menu-trigger" onclick="toggleMenu(event)"></div>
    
    <div id="menu">
        <div class="item" onclick="selectMode('alphabet', event)">🔠 Алфавит</div>
        <div class="item" onclick="selectMode('physics', event)">⚽ Физика</div>
        <div class="item" onclick="selectMode('pop', event)">🎈 Шарики</div>
        <div class="item" onclick="selectMode('none', event)">🏠 Главная</div>
    </div>

    <div id="welcome-screen">
        <h1>MAGIC PORTAL</h1>
        <p>Нажми на синюю полоску слева</p>
    </div>

    <script src="https://cdnjs.cloudflare.com"></script>
    <script src="script.js"></script>
</body>
</html>
