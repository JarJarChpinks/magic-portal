<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Magic Portal PRO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ЭКРАН ВЫБОРА (Обязателен для активации звука и фулскрина) -->
    <div id="startup-screen" style="position:fixed; inset:0; background:#000; z-index:100000; display:flex; flex-direction:column; justify-content:center; align-items:center; color:white; font-family:sans-serif;">
        <h1 class="glow-text" style="margin-bottom:30px;">MAGIC PORTAL</h1>
        <div style="display:flex; gap:20px;">
            <button class="alphabet-btn" onclick="boot('pc')">💻 PC ВЕРСИЯ</button>
            <button class="alphabet-btn" onclick="boot('mobile')">📱 МОБИЛЬНАЯ</button>
        </div>
    </div>

    <div id="menu-trigger"></div>
    <nav id="menu">
        <div class="item" onclick="location.reload()">🏠 ГЛАВНОЕ МЕНЮ</div>
        <div id="menu-list"></div>
    </nav>

    <div id="welcome-screen">
        <h1>MAGIC PORTAL</h1>
        <p>Выберите игру в меню слева</p>
    </div>

    <!-- Твои оригинальные элементы -->
    <div id="quest-panel"></div>
    <div id="alphabet-timer">0.0с</div>
    <div id="alphabet-record"></div>
    <button id="physics-launcher">ЗАПУСТИТЬ ЛАВИНУ 🏔️</button>

    <canvas></canvas>
    <script src="script.js"></script>
</body>
</html>
