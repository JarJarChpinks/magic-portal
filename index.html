<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Portal 13.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="menu-trigger"></div>
    <nav id="menu">
        <div class="item" data-mode="none">🏠 Главная</div>
        <div class="item" data-mode="chaos">🌌 Космос</div>
        <div class="item" data-mode="pop">💥 Хлопушки</div>
        <div class="item" data-mode="snake">🐍 Гусеница</div>
        <div class="item" data-mode="physics">🏔️ Лавина</div>
        <div class="item" data-mode="symphony">🎹 Симфония</div>
        <div class="item" data-mode="alphabet">🅰️ Алфавит</div>
        <div class="item" data-mode="flashlight">🔦 Фонарик</div>
    </nav>

    <div id="welcome-screen">
        <h1>MAGIC PORTAL</h1>
        <p>Выберите игру в меню слева</p>
    </div>

    <div id="auth-screen" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:10000; flex-direction:column; justify-content:center; align-items:center; color:white;">
    <h2>Введите данные для рейтинга</h2>
    <input type="text" id="user-name" placeholder="Имя" style="margin:10px; padding:10px;">
    <input type="number" id="user-age" placeholder="Возраст" style="margin:10px; padding:10px;">
    <button class="alphabet-btn" onclick="saveProfile()">СОХРАНИТЬ</button>
</div>

    <button id="physics-launcher">ЗАПУСТИТЬ ЛАВИНУ 🏔️</button>

    <script src="script.js"></script>
    <!-- Окно выбора участия в рейтинге -->
<div id="rank-choice-screen" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:11000; flex-direction:column; justify-content:center; align-items:center; color:white;">
    <h2>Участвовать в мировом рейтинге?</h2>
    <div style="display:flex; gap:20px; margin-top:20px;">
        <button class="alphabet-btn" onclick="confirmRank(true)">ДА ✅</button>
        <button class="alphabet-btn" onclick="confirmRank(false)">НЕТ ❌</button>
    </div>
    <div id="leaderboard-container" style="margin-top:30px; width:300px; height:250px; overflow-y:auto; background:rgba(255,255,255,0.1); padding:15px; border-radius:15px; border:1px solid #444;">
        <h3 style="text-align:center; color:#00fbff;">ТОП 20 ИГРОКОВ</h3>
        <div id="leaderboard-list">Загрузка...</div>
    </div>
</div>
</body>
</html>
