<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Magic Portal 13.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="menu-trigger"></div>
    <nav id="menu">
        <div class="item" data-mode="none">🏠 Главная</div>
        <div class="item" data-mode="chaos">🌌 Космос</div>
        <div class="item" data-mode="pop">💥 Хлопушки</div>
        <div class="item" data-mode="snake">🐍 Гусеница</div>
        <div class="item" data-mode="physics">🏔️ Лавина</div>
        <div class="item" data-mode="symphony">🎹 Симфония</div>
        <div class="item" data-mode="alphabet">🅰️ Алфавит</div>
        <div class="item" data-mode="flashlight">🔦 Фонарик</div>
    </nav>

    <div id="welcome-screen">
        <h1>MAGIC PORTAL</h1>
        <p>Выберите игру в меню слева</p>
    </div>

    <!-- Кнопка для режима лавины -->
    <button id="physics-launcher">ЗАПУСТИТЬ ЛАВИНУ 🏔️</button>

    <script src="script.js"></script>
    <script>
        // Логика открытия меню (триггер слева)
        const menu = document.getElementById('menu');
        const trigger = document.getElementById('menu-trigger');

        trigger.addEventListener('mouseenter', () => menu.classList.add('active'));
        menu.addEventListener('mouseleave', () => menu.classList.remove('active'));

        // Привязка кликов меню к функции setMode из script.js
        document.querySelectorAll('.item').forEach(item => {
            item.addEventListener('click', () => {
                const mode = item.getAttribute('data-mode');
                if (window.setMode) {
                    window.setMode(mode);
                }
                menu.classList.remove('active');
            });
        });
    </script>
</body>
</html>
